name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ scripts/ tests/ --exit-zero

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install minimal test deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy xarray pytest
      - name: Run HSI tests (no full package install)
        run: |
          PYTHONPATH=src pytest tests/test_hsi.py -v
