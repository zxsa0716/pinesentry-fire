name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff black mypy
      - run: ruff check src/ scripts/ tests/
      - run: black --check src/ scripts/ tests/
      - run: mypy src/pinesentry_fire/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install numpy xarray pytest
          pip install -e .
      - name: Run tests
        run: pytest tests/ -v

  notebook-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install nbval xarray numpy pytest
      - name: Validate notebook syntax (no execution)
        run: |
          for nb in notebooks/*.ipynb; do
            jupyter nbconvert --to script "$nb" || true
          done
